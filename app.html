  }

  /* FORMAT CHIPS */
  .format-chips {
    display: flex;
    flex-wrap: nowrap;
    align-items: center;
    gap: 6px;
    margin-bottom: 24px;
    overflow-x: auto;
  }
  .format-chips-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-right: 4px;
  }
  .format-chip {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 6px 12px;
    border: 1px solid #dddbd5;
    background: #f5f5f0;
    color: var(--ink-mid);
    cursor: pointer;
    transition: all 0.12s;
    border-radius: 20px;
    white-space: nowrap;
  }
  .format-chip:hover { background: var(--ink); color: var(--yellow); border-color: var(--ink); }
  .format-chip.active {
    background: var(--ink);
    color: var(--yellow);
    border-color: var(--ink);
  }
  .conditional-fields { margin-top: 0; }

  /* HEADER */
  header {
    background: rgba(248,247,243,0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 1px 12px rgba(0,0,0,0.07);
    padding: 12px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 150;
  }

  .logo-mark {
    width: 14px;
    height: 14px;
    flex-shrink: 0;
    transform: rotate(18deg);
    margin-left: 2px;
    margin-right: 0;
    position: relative;
    top: -6px;
    object-fit: contain;
  }

  .logo {
    font-family: 'Rock Salt', cursive;
    font-weight: 400;
    font-size: 13px;
    color: var(--ink);
    letter-spacing: -0.02em;
    display: inline-flex;
    align-items: center;
  }
  .logo img { height: 22px; width: auto; }


  .header-right {
    display: flex;
    align-items: center;
    gap: 28px;
  }

  .header-tag {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: #555;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .header-tag strong {
    color: #aaa;
  }

  /* MAIN */
  main {
    flex: 1;
    max-width: 1100px;
    width: 100%;
    margin: 0 auto;
    padding: 88px 40px 32px;
  }

  /* HERO */
  .hero {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 20px;
    padding-top: 60px;
    padding-bottom: 40px;
    position: sticky;
    top: 48px;
  }

  .hero-headline {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: clamp(36px, 5vw, 60px);
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin-bottom: 16px;
  }

  /* CRACK WORD */
  .crack-word {
    font-style: italic;
  }

<body>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <span class="sidebar-title">Brief History</span>
    <button class="sidebar-close" onclick="toggleSidebar()">✕</button>
  </div>
  <div style="padding:14px 16px;border-bottom:1px solid #dddbd5;flex-shrink:0;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <span id="sidebarEmail" style="font-family:'Space Mono',monospace;font-size:9px;letter-spacing:0.08em;color:var(--ink-light);text-transform:uppercase;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
      <a href="/api/auth/logout" style="font-family:'Space Mono',monospace;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-mid);text-decoration:none;flex-shrink:0;">Sign out</a>
    </div>
    <div id="planIndicator" style="display:inline-flex;align-items:center;gap:6px;">
      <span id="planBadge" style="font-family:'Space Mono',monospace;font-size:8px;letter-spacing:0.15em;text-transform:uppercase;padding:3px 8px;border:1px solid #dddbd5;color:var(--ink-light);">Free Plan</span>
    </div>

<script>
// Check authentication on load
(async function() {
  try {
    const res = await fetch('/api/auth/session');
    const data = await res.json();
    if (!data.authenticated) {
      location.href = '/login.html';
      return;
    }
    // Store user data globally
    window._crackedUser = data;
    const emailEl = document.getElementById('sidebarEmail');
    if (emailEl && data.email) emailEl.textContent = data.email;
    // Plan badge
    const planBadge = document.getElementById('planBadge');
    if (planBadge) {
      if (data.isPro) {
        planBadge.textContent = 'Pro';
        planBadge.style.cssText = 'font-family:Space Mono,monospace;font-size:8px;letter-spacing:0.15em;text-transform:uppercase;padding:3px 10px;background:var(--yellow);border:1.5px solid var(--ink);color:var(--ink);font-weight:700;';
      } else {
        const rem = data.credits !== undefined ? ` · ${data.credits} left` : '';
        planBadge.textContent = 'Free Plan' + rem;
      }
    }
    // Show credits in header
    if (data.credits !== undefined && !data.isPro) {
      const creditsEl = document.createElement('div');
      creditsEl.id = 'credits-display';
      creditsEl.style.cssText = 'font-family:Space Mono,monospace;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-light);position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:100;';
      creditsEl.textContent = data.credits + ' generations remaining';
      document.body.appendChild(creditsEl);
    }
  } catch(e) {
    location.href = '/login.html';
  }
})();

// ── BRIEF HISTORY SIDEBAR ────────────────────────────────────────────────────
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  sidebar.classList.toggle('open');
  overlay.classList.toggle('open');
  if (sidebar.classList.contains('open')) renderHistory();
}

function getHistory() {
  try { return JSON.parse(localStorage.getItem('cracked_history') || '[]'); }
  catch { return []; }
}

function saveHistory(history) {
  localStorage.setItem('cracked_history', JSON.stringify(history.slice(0, 50)));
}

function addToHistory(brand, audience, brief, format, concepts) {
  const history = getHistory();
  history.unshift({
    id: Date.now(),
    brand: brand || 'Untitled',
    audience: audience || '',
    brief: brief || '',
    format: format || 'Full Campaign',
    date: new Date().toLocaleDateString('en-AU', {day:'numeric', month:'short', year:'numeric'}),
    concepts: (concepts || []).map(c => ({
      name: c.name || c.headline || '',
      logline: c.logline || '',
      concept: c.concept || '',
      keyInsight: c.keyInsight || '',
      executionIdea: c.executionIdea || '',
      skipped: false,
    })),
  });
  saveHistory(history);
}

function skipConcept(historyId, conceptIdx) {
  const history = getHistory();
  const item = history.find(h => h.id === historyId);
  if (item && item.concepts && item.concepts[conceptIdx]) {
    item.concepts[conceptIdx].skipped = true;
    saveHistory(history);
    renderHistory();
  }
}

function deleteFromHistory(id) {
  const history = getHistory().filter(h => h.id !== id);
  saveHistory(history);
  renderHistory();
}

function loadFromHistory(item) {
  // Restore brief fields
  document.getElementById('brand').value = item.brand || '';
  document.getElementById('audience').value = item.audience || '';
  document.getElementById('brief').value = item.brief || '';
  toggleSidebar();

  // If we have saved concepts, re-render them
  const concepts = (item.concepts || []).filter(c => !c.skipped);
  if (!concepts.length) {
    document.getElementById('results').classList.remove('active');
    document.getElementById('briefForm').scrollIntoView({ behavior: 'smooth' });
    return;
  }

  const grid = document.getElementById('conceptsGrid');
  grid.innerHTML = '';

  concepts.forEach((c, i) => {
    const card = document.createElement('div');
    card.className = 'concept-card';
    card.innerHTML = `
      <div class="concept-num">Concept ${String(i+1).padStart(2,'0')}</div>
      <div class="concept-name-wrap"><span class="concept-name"><span class="highlight-line">${c.name || ''}</span></span></div>
      ${c.logline ? `<div class="concept-logline">"${c.logline}"</div>` : ''}
      ${c.concept ? `<div class="concept-body">${c.concept}</div>` : '<div class="concept-body" style="color:var(--ink-light);font-style:italic;">Re-run this brief to see the full concept.</div>'}
      ${c.keyInsight ? `<span class="concept-label">The insight</span><div class="concept-body">${c.keyInsight}</div>` : ''}
      ${c.executionIdea ? `<span class="concept-label">Bring it to life</span><div class="concept-body">${c.executionIdea}</div>` : ''}
      <div class="concept-image" style="display:none;"></div>
      <div class="concept-meta"></div>
      <button class="sketch-btn" onclick="resketchFromHistory(this, ${i}, '${(item.brand||'').replace(/'/g,"\'")}')">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        Re-scamp this
      </button>`;
    grid.appendChild(card);
  });

  document.getElementById('resultsTitle').textContent = `${concepts.length} concepts — ${item.brand || 'brief'} cracked`;
  window._currentBrand = item.brand || '';
  document.getElementById('results').classList.add('active');
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

async function resketchFromHistory(btn, index, brand) {
  // Re-scamp a specific concept card from history
  const cards = document.querySelectorAll('.concept-card');
  const card = cards[index];
  if (!card) return;
  const conceptName = card.querySelector('.highlight-line')?.textContent || '';
  const conceptBody = card.querySelector('.concept-body')?.textContent || '';
  btn.disabled = true;
  btn.textContent = 'Scamping...';
  const imgDiv = card.querySelector('.concept-image');
  try {
    const r = await fetch('/api/image', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ concept: conceptName + '. ' + conceptBody, brand })
    });
    const { jobId } = await r.json();
    let result;
    for (let t = 0; t < 60; t++) {
      await new Promise(res => setTimeout(res, 3000));
      const s = await fetch('/api/image-status/' + jobId);
      const j = await s.json();
      if (j.status === 'done') { result = j.result; break; }
    }
    if (result) {
      const parsed = JSON.parse(result);
      const imgSrc = parsed.data?.[0]?.b64_json ? 'data:image/png;base64,' + parsed.data[0].b64_json : null;
      if (imgSrc) {
        imgDiv.innerHTML = `<img src="${imgSrc}" alt="Concept scamp" style="width:100%;margin-top:16px;border:1px solid var(--ink);" />`;
        imgDiv.style.display = 'block';
      }
    }
  } catch(e) {}
  btn.disabled = false;
  btn.textContent = 'Re-scamp this';
}

function renderHistory() {
  const body = document.getElementById('sidebarBody');
  const history = getHistory();
  if (!history.length) {
    body.innerHTML = '<p class="sidebar-empty">Your generated briefs<br>will appear here</p>';
    return;
  }
  body.innerHTML = history.map(h => {
    const concepts = (h.concepts || []).filter(c => !c.skipped);
    const conceptsHtml = concepts.length ? `
      <div style="margin-top:10px;border-top:1px dashed #dddbd5;padding-top:10px;">
        ${concepts.map((c, i) => `
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:8px;">
            <div>
              <div style="font-family:'Fraunces',serif;font-weight:700;font-size:11px;color:var(--ink);">${c.name}</div>
              ${c.logline ? `<div style="font-size:10px;color:var(--ink-mid);line-height:1.4;margin-top:2px;">${c.logline.slice(0,80)}${c.logline.length>80?'…':''}</div>` : ''}
            </div>
            <button onclick="event.stopPropagation();skipConcept(${h.id},${i})" title="Delete this concept" style="background:none;border:none;color:var(--ink-light);cursor:pointer;font-size:14px;padding:2px 4px;flex-shrink:0;line-height:1;">🗑</button>
          </div>
        `).join('')}
      </div>
    ` : '';
    return `
      <div class="history-item" onclick="loadFromHistory(${JSON.stringify(h).replace(/"/g, '&quot;')})">
        <button class="history-delete" onclick="event.stopPropagation();deleteFromHistory(${h.id})">×</button>
        <div class="history-brand">${h.brand}</div>
        <div class="history-meta">${h.format} · ${h.date}</div>
        ${h.brief ? `<div class="history-brief">${h.brief.slice(0,100)}${h.brief.length>100?'…':''}</div>` : ''}
        ${conceptsHtml}
      </div>
    `;
  }).join('');
}
</script>

<main>
  <div class="brief-form" id="briefForm">
    <div class="form-header">
      <span class="form-header-title">The Brief</span>
      <span class="form-header-date" style="margin-right: 3px;" id="formDate"></span>
    </div>
    <div class="form-body">

      <!-- Shared fields -->
      <div class="form-row">
        <div class="form-group">
          <label>Brand / Product</label>
          <input type="text" id="brand" placeholder="e.g. Oatly, Nike, Dove" />
        </div>
        <div class="form-group">
          <label>Target Audience</label>
          <input type="text" id="audience" placeholder="e.g. Gen Z urban professionals" />
        </div>
      </div>

      <!-- Examples row — visible for new users, hidden for returning -->
      <div class="examples-row" id="examplesRow">
        <span class="examples-label">Load an example</span>
        <button class="example-pill" onclick="loadExample('balter')">Balter</button>
        <button class="example-pill" onclick="loadExample('guinness')">Guinness</button>
        <button class="example-pill" onclick="loadExample('qantas')">Qantas</button>
        <button class="example-pill" onclick="loadExample('kitkat')">KitKat</button>
        <button class="example-pill" onclick="loadExample('aesop')">Aesop</button>
        <button class="example-pill" onclick="loadExample('ikea')">IKEA</button>
      </div>
      <div id="exampleLink" style="display:none;margin-bottom:16px;"><button onclick="showExamples()" style="background:none;border:none;cursor:pointer;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-light);padding:0;text-decoration:underline;">Load an example →</button></div>

      <!-- Format chips -->
      <div class="format-chips" id="formatChips">
        <span class="format-chips-label">Format</span>
        <button class="format-chip active" onclick="setFormat('campaign')" id="chip-campaign">Full Campaign</button>
        <button class="format-chip" onclick="setFormat('social')" id="chip-social">Social</button>
        <button class="format-chip" onclick="setFormat('film')" id="chip-film">Film</button>
        <button class="format-chip" onclick="setFormat('content')" id="chip-content">Content Series</button>
        <button class="format-chip" onclick="setFormat('ooh')" id="chip-ooh">OOH</button>
        <button class="format-chip" onclick="setFormat('activation')" id="chip-activation">Activation</button>
        <button class="format-chip" onclick="setFormat('print')" id="chip-print">Print</button>
      </div>

      <div class="form-row">
        <div class="form-group full">
          <textarea id="brief" placeholder="Describe the creative challenge. The more specific you are, the better the ideas."></textarea>
        </div>
      </div>

      <!-- Conditional fields — shown based on chip selection -->
      <div class="conditional-fields" id="conditionalFields">

        <!-- Campaign fields -->
        <div id="fields-campaign">
          <div class="form-row">
            <div class="form-group">
              <label>Campaign Ambition</label>
              <select id="ambition" style="width:100%">
                <option value="">Select ambition</option>
                <option>Change behaviour</option>
                <option>Challenge a cultural norm</option>
                <option>Launch a new product</option>
                <option>Reposition a brand</option>
                <option>Drive brand fame</option>
                <option>Respond to a cultural moment</option>
                <option>Make people feel something</option>
              </select>
            </div>
          </div>
          <input type="hidden" id="channel" value="" />
        </div>

        <!-- Content Series fields -->
        <div id="fields-content" style="display:none">
          <div class="form-row">
            <div class="form-group">
              <label>Platform</label>
              <select id="contentPlatform">
                <option value="">Any platform</option>
                <option>TikTok</option>
                <option>Meta (Facebook &amp; Instagram)</option>
                <option>YouTube</option>
                <option>LinkedIn</option>
                <option>Podcast</option>
                <option>Pinterest</option>
                <option>Snapchat</option>
                <option>X (Twitter)</option>
              </select>
            </div>
            <div class="form-group">
              <label>Series Ambition</label>
              <select id="contentAmbition">
                <option value="">Select ambition</option>
                <option>Build brand community</option>
                <option>Establish category authority</option>
                <option>Drive product discovery</option>
                <option>Entertain &amp; grow audience</option>
                <option>Educate &amp; inform</option>
                <option>Challenge a cultural norm</option>
                <option>Make people feel something</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group full">
              <label>Content Territory</label>
              <input type="text" id="contentTerritory" placeholder="e.g. the intersection of food and culture, honest money advice for young people" />
            </div>
          </div>
        </div>

        <!-- Social fields -->
        <div id="fields-social" style="display:none">
          <div class="form-row">
            <div class="form-group">
              <label>Platform</label>
              <select id="socialPlatform">
                <option value="">Any platform</option>
                <option>TikTok</option>
                <option>Instagram</option>
                <option>YouTube</option>
                <option>LinkedIn</option>
                <option>X (Twitter)</option>
                <option>Snapchat</option>
              </select>
            </div>
            <div class="form-group">
              <label>Social Ambition</label>
              <select id="socialAmbition">
                <option value="">Select ambition</option>
                <option>Build brand community</option>
                <option>Drive brand fame</option>
                <option>Go viral</option>
                <option>Drive product discovery</option>
                <option>Challenge a cultural norm</option>
                <option>Make people feel something</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Film — no extra fields needed -->
        <div id="fields-film" style="display:none"></div>

        <!-- Print — no extra fields needed -->
        <div id="fields-print" style="display:none"></div>

        <!-- OOH — no extra fields needed -->
        <div id="fields-ooh" style="display:none"></div>

        <!-- Activation — no extra fields needed -->
        <div id="fields-activation" style="display:none"></div>

      </div><!-- end conditional fields -->

      <!-- Always-visible bottom row -->
      <div class="form-row">
        <div class="form-group">
          <label>Tone</label>
          <select id="tone">
            <option value="">Any direction</option>
            <option>Bold &amp; provocative</option>
            <option>Warm &amp; human</option>
            <option>Witty &amp; playful</option>
            <option>Cinematic &amp; epic</option>
            <option>Raw &amp; honest</option>
            <option>Surreal &amp; unexpected</option>
            <option>Minimalist &amp; pure</option>
          </select>
        </div>
        <div class="form-group">
          <label>Number of concepts</label>
          <select id="numConcepts">
            <option value="1" selected>1 concept</option>
            <option value="3">3 concepts</option>
            <option value="5">5 concepts</option>
          </select>
        </div>
      </div>
      <div class="submit-row">
        <button class="btn-generate" id="generateBtn" onclick="crackTheBrief()">Crack the Brief</button>
        <div style="display:flex;align-items:center;gap:10px;cursor:pointer;position:relative;" onclick="toggleScamps()">

const EXAMPLES = {
  balter: { brand:'Balter Brewing', audience:'Australian craft beer drinkers 25-40 who championed Balter before the CUB buyout and now feel conflicted', ambition:'Challenge a cultural norm', brief:"Balter was founded by pro surfers Mick Fanning and Joel Parkinson with one mission: good beer is for everybody. They built something real — fun, inclusive, unpretentious. Then Carlton United Breweries bought them. Now they're everywhere, which was the point, but some of the faithful feel betrayed. The brand voice is larrikin without being a dickhead about it — casual, self-aware, never takes itself too seriously. Ideas should feel like something you'd say over a beer, not in a boardroom. The creative challenge: how do you scale without selling out — or do you lean into the contradiction with the same honesty that made people love Balter in the first place?", tone:'Raw & honest' },
  moccona: { brand:'Moccona', audience:'Australians 35-60 who grew up with Moccona on the bench but have quietly moved on to pods or cafe coffee', ambition:'Reposition a brand', brief:"Moccona was Australia's idea of sophisticated coffee for 50 years — that distinctive jar was a status symbol on the kitchen bench. Then the world got complicated. Pods arrived. Third wave cafes arrived. The jar started looking daggy. Moccona's tone has always been warm, considered, slightly European — unhurried, never shouty. It should never try to be a young brand. The creative challenge: find Moccona's place in a coffee culture it no longer leads, without apologising for what it is. There's something powerful in a brand that knows exactly what it is and refuses to pretend otherwise.", tone:'Warm & human' },
  qantas: { brand:'Qantas', audience:'Australians who fly regularly but have lost faith in the airline after years of cancelled flights, lost baggage and a CEO who became a villain', ambition:'Reposition a brand', brief:"Qantas used to make Australians feel proud. The Flying Kangaroo was ours — something we pointed at and said 'that's us.' Then came the pandemic, then came Alan Joyce, then came the Senate inquiry. Australians feel genuinely betrayed. The brand has historically been warm, patriotic, cinematic — the 'I Still Call Australia Home' school of advertising. But that register feels tone-deaf right now. The creative challenge: begin rebuilding trust without pretending nothing happened. Earned humility, not manufactured warmth. This is a brand that needs to listen before it speaks.", tone:'Raw & honest' },
  guinness: { brand:'Guinness', audience:'Australian beer drinkers 25-45 who see Guinness as a special occasion pint, not an everyday drink', ambition:'Drive brand fame', brief:"Guinness is one of the world's most mythologised brands. It moves slowly, deliberately, quietly — like the pour itself. The brand tone is cinematic and philosophical. It finds meaning in ordinary things. It never shouts. It speaks to people who value character over convenience. The 119.5 seconds of the perfect pour isn't a problem — it's the entire point. Younger Australians see Guinness as their dad's pint, something you order at an Irish pub on St Patrick's Day. The creative challenge: show that waiting for a Guinness isn't just acceptable — it's a virtue. In a world engineered for instant everything, the man who waits has already won.", tone:'Cinematic & epic' },
  up: { brand:'Up Bank', audience:'Australians 18-35 who hate their bank but have never heard of anything better', ambition:'Drive brand fame', brief:"Up Bank is Melbourne-born, built by engineers who were sick of bad banking apps. The product is genuinely world-class — beautiful design, real-time spending insights, no fees. The tone is digital-native, warm, occasionally cheeky — it talks like a friend, not a financial institution. Up has grown almost entirely on word of mouth. The problem: most Australians have never heard of it. The creative challenge: scale awareness without losing the thing that made word of mouth work. Up's magic is that it feels like it's on your side — which is radical in a category designed to confuse you. Don't lose that.", tone:'Bold & provocative' },
  hj: { brand:"Hungry Jack's", audience:'Australians 16-35 who eat fast food regularly but default to McDonalds out of habit', ambition:'Challenge a cultural norm', brief:"Everyone knows the burgers are better at Hungry Jack's. This isn't opinion — it's practically a national truth. The Whopper is objectively a better burger than the Big Mac. And yet McDonald's dominates. Hungry Jack's tone has always been a bit larrikin, a bit challenger — it's never pretended to be premium, it just claims to be better. The creative challenge: break a habit that has nothing to do with quality and everything to do with familiarity. People choose McDonald's on autopilot. The golden arches have become a default, not a decision. How do you make people actually think?", tone:'Bold & provocative' },
  mg: { brand:'MG Motor', audience:"Australians who bought an MG because the value was undeniable but feel slightly embarrassed to admit it", ambition:'Drive brand fame', brief:"MG is selling more cars in Australia than anyone predicted. The spec is genuinely impressive. The price is unbeatable. But nobody is proud to own one — nobody puts an MG sticker on their laptop or mentions it at a dinner party. It's a rational purchase people make and then quietly justify. The brand has almost no emotional identity in Australia. The creative challenge: build genuine brand love for a car people chose with their head, not their heart. You can't make people proud of something they already own by just making ads — you have to give them a real reason to believe.", tone:'Bold & provocative' },
  aesop: { brand:'Aesop', audience:'Design-conscious Australians 25-45 who see Aesop as a marker of good taste but struggle to justify the price', ambition:'Drive brand fame', brief:"Aesop is one of the most distinctive brands ever created. Every detail is considered — the amber bottles, the apothecary labels, the store design, the literary tone of every piece of copy. The brand communicates through restraint. It whispers where others shout. It quotes Camus on product packaging. It treats customers as intellectuals, not consumers. No celebrities. No discounts. No promises of eternal youth. Aesop's reputation for being slightly pretentious is both its greatest asset and its only vulnerability. The creative challenge: make Aesop feel genuinely warm and human without losing the intellectual rigour that makes it extraordinary. Ideas should feel like they were written by someone who reads.", tone:'Minimalist & pure' },
  ringers: { brand:'Ringers Western', audience:'Both working rural Australians and urban 18-35s who romanticise country life', ambition:'Challenge a cultural norm', brief:"Ringers Western makes gear for people who actually work the land — jackets, boots, hats built for real conditions. But it's increasingly being discovered by city kids who romanticise country life and want to look the part. The brand voice is direct, no-bullshit, authentically Australian — it doesn't wink at the camera or play up the rural cliché. It just means it. The creative challenge: navigate the tension between authentic rural heritage and a growing urban audience without alienating either. Lean too hard into the bush and you lose the city. Go too lifestyle and you lose the people who actually muster cattle. The answer probably lives somewhere in genuine respect for both.", tone:'Raw & honest' },
  kitkat: { brand:'KitKat', audience:'Global audience of adults 18-35 who are chronically overworked and permanently online', ambition:'Drive brand fame', brief:"Have a Break has been one of advertising's most enduring ideas — simple, human, true. But the world it was made for no longer exists. Australians work longer hours than almost any developed nation. They eat lunch at their desks. They check Slack at 11pm. The idea of a break has never been more needed — or more impossible. KitKat's tone is playful but never silly. It's knowing, a bit witty, always warm. It doesn't lecture. The creative challenge: make KitKat the brand that gives people genuine permission to stop — in a world that never does. Not just a chocolate bar you eat without thinking. A cultural position on rest that feels radical because it should be obvious.", tone:'Witty & playful' },
  stan: { brand:'Stan', audience:"Australians 25-45 who have Stan but feel vaguely embarrassed when someone asks what they watch", ambition:'Reposition a brand', brief:"Stan is Australia's homegrown streaming service. It has millions of subscribers and genuinely good content. But it occupies an awkward cultural position — nobody leads with Stan. Netflix is prestige. Disney+ is family. Binge is HBO. Stan is... there. It's the streaming service you recommend apologetically: 'it's actually pretty good.' The brand has historically been functional rather than cultural. The creative challenge: make Stan feel like a first choice, not a fallback. Australians should be proud to recommend Stan the way they're proud to recommend a good local restaurant. The answer probably isn't about content — it's about making Stan feel like it belongs to Australia in a way no other service can claim.", tone:'Bold & provocative' },
  nrl: { brand:'NRL', audience:'Australians in Melbourne, Adelaide and Perth who follow AFL but have never given rugby league a chance', ambition:'Challenge a cultural norm', brief:"The NRL is the biggest sport in Queensland and NSW — fast, brutal, genuinely spectacular. But south of the Barassi Line it may as well be a foreign language. In Melbourne, AFL is everything. The NRL feels like someone else's game, someone else's culture. The brand tone for this challenge needs to be confident but not arrogant — it can't alienate AFL fans by attacking the code they love. The creative challenge: make the NRL feel like it belongs to all Australians, not just the ones above the border. There's probably something powerful in the fact that rugby league doesn't care if you like it — it's been there your whole life whether you noticed or not.", tone:'Bold & provocative' },
  specsavers: { brand:'Specsavers', audience:"Australians 25-50 who go to Specsavers because it's the sensible choice but would never describe themselves as a Specsavers person", ambition:'Reposition a brand', brief:"Should've Gone to Specsavers is one of the most famous taglines in Australian advertising — self-deprecating, funny, memorable. Specsavers built dominance on price and accessibility. But eyewear has become fashion. Oscar Wylee, Bailey Nelson, Ollie Quinn are making glasses feel like a design choice. Specsavers' tone has always been warm and approachable with a dry sense of humour. The creative challenge: evolve from the brand people go to because it's affordable to the brand people go to because it's genuinely good. The price advantage is real — but the perception needs to catch up with the reality that Specsavers actually makes excellent eyewear.", tone:'Witty & playful' },
  ikea: { brand:'IKEA', audience:'Adults 25-45 who own IKEA furniture but quietly replace it with "better" things as they get older and earn more money', ambition:'Reposition a brand', brief:"IKEA was built on a single radical idea: beautiful design shouldn't cost a fortune. In 1958 that was genuinely subversive. Now it's everywhere. Every fast-fashion homeware brand, every DTC startup, every Amazon marketplace seller is doing cheap-and-decent design. The democratisation of design that IKEA pioneered has been so successful that IKEA's own proposition has been eaten alive by it. Worse, IKEA has become aspirational for people who can't afford it yet — and embarrassing for people who can. The Billy bookcase is what you have before you have taste. The creative challenge: in a world IKEA made possible, make IKEA feel worth choosing again. Not just affordable. Not just functional. Actually desirable. The answer probably isn't about price. And it definitely isn't about sustainability.", tone:'Witty & playful' },
  canva: { brand:'Canva', audience:'Designers and marketers who use Canva daily but feel slightly guilty admitting it to people who use the Adobe suite', ambition:'Drive brand fame', brief:"Canva started as a scrappy Melbourne startup with a simple idea: design shouldn't require a design degree. It democratised an entire industry and made the establishment uncomfortable. Now it's worth $40 billion and used by 170 million people. The brand tone is warm, optimistic, democratising — it believes everyone has something to say and should be able to say it beautifully. But as Canva scales into enterprise and competes with Microsoft and Google, the scrappy underdog spirit is under threat. The creative challenge: grow to global dominance without losing the thing that made people love Canva — that it felt like it was on your side against the establishment.", tone:'Bold & provocative' },
  woodstock: { brand:'Woodstock Bourbon', audience:'Australians 25-45 who drink Woodstock without thinking but could not tell you a single thing about the brand', ambition:'Drive brand fame', brief:"Woodstock has been in Australian fridges since 1980. It's the bourbon at every footy club, every house party, every regional pub. Nobody talks about it. Everyone drinks it. It wins on habit and availability, not aspiration. Woodstock just launched their biggest brand campaign in years — Australia noticed. But does one campaign change 40 years of being the bourbon you drink without thinking? The brand tone should be laconic, honest, unpretentious — the complete opposite of the American bourbon playbook with its heritage mythology and distillery reverence. Woodstock is just a good drink that doesn't need to be more than that. The creative challenge: turn Australia's most habitual drink into Australia's most loved one, without making it something it's not.", tone:'Warm & human' }
};

async function writeScript(btn, index) {
  const cards = document.querySelectorAll('.concept-card');
  const card = cards[index];
  const conceptName = card.querySelector('.highlight-line').textContent;
  const logline = card.querySelector('.concept-logline').textContent.replace(/^"|"$/g, '');
  const concept = card.querySelectorAll('.concept-body')[0].textContent;
  const brand = window._currentBrand || '';

  btn.classList.add('loading');
  btn.textContent = 'Writing script...';

  // Remove any existing script output
  const existing = card.querySelector('.script-output');
  if (existing) existing.remove();

  try {
    const res = await fetch('/api/script', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ conceptName, logline, concept, brand }),
    });
    const data = await res.json();
    const text = data.content && data.content[0] ? data.content[0].text : 'Could not generate script.';
    const out = document.createElement('div');
    out.className = 'script-output';
    out.textContent = text;
    card.appendChild(out);
    out.scrollIntoView({ behavior: 'smooth', block: 'start' });
  } catch(e) {
    const out = document.createElement('div');
    out.className = 'script-output';
    out.textContent = 'Failed to write script. Try again.';
    card.appendChild(out);
  }

  btn.classList.remove('loading');
  btn.textContent = 'Write the Full Script →';
}

function sketchConcept(btn, index) {
  var cards = document.querySelectorAll('.concept-card');
  var card = cards[index];
  var imgDiv = card.querySelector('.concept-image');
  var conceptName = card.querySelector('.highlight-line').textContent;
  var bodyEls = card.querySelectorAll('.concept-body');
  var conceptBody = Array.from(bodyEls).slice(0,2).map(el => el.textContent).join(' ');
  btn.classList.add('loading');
  btn.innerHTML = 'Scamping...';
  imgDiv.style.display = 'flex';
  imgDiv.innerHTML = '<span class="img-loading">Sketching concept...</span>';
  fetch('/api/image', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ concept: conceptName + ': ' + conceptBody, brand: window._currentBrand || '' })
  })
  .then(r => r.json())
  .then(async startData => {
    const jobId = startData.jobId;
    var imgSrc = '';
    while (true) {
      await new Promise(r => setTimeout(r, 2000));
      const pollR = await fetch('/api/image-status/' + jobId);
      const pollData = await pollR.json();
      if (pollData.status === 'done') {
        console.log('Job done, result:', pollData.result.substring(0,100));
        const result = JSON.parse(pollData.result);
        console.log('Parsed result:', result);
        if (result.data && result.data[0] && result.data[0].b64_json) {
          imgSrc = 'data:image/png;base64,' + result.data[0].b64_json;
          imgDiv.innerHTML = '<img src="' + imgSrc + '" alt="Concept visual" />';
          console.log('Image inserted via b64');
        } else if (result.data && result.data[0] && result.data[0].url) {
          imgSrc = result.data[0].url;
          imgDiv.innerHTML = '<img src="' + imgSrc + '" alt="Concept visual" />';
          console.log('Image inserted via url');
        } else {
          imgDiv.innerHTML = '';
          console.log('No image data found');
        }
        break;
      } else if (pollData.status === 'error' || pollData.status === 'not_found') {
        imgDiv.innerHTML = '';
        break;
      }
    }
    btn.style.display = 'none';
    var downloadRow = document.createElement('div');
    downloadRow.style.cssText = 'display:flex;gap:8px;margin-top:12px;justify-content:flex-end;';
    var dlJpeg = document.createElement('a');
    dlJpeg.href = imgSrc;
    dlJpeg.download = (window._currentBrand || 'cracked').toLowerCase().replace(/\s+/g, '-') + '-' + (conceptName || 'concept').toLowerCase().replace(/\s+/g, '-') + '.jpg';
    dlJpeg.innerHTML = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download scamp (JPEG)';
    dlJpeg.style.cssText = "display:flex;align-items:center;gap:5px;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink);border:1.5px solid var(--ink);padding:6px 12px;background:var(--white);box-shadow:2px 2px 0 var(--ink);text-decoration:none;cursor:pointer;";
    dlJpeg.onmouseover = function(){ this.style.background='var(--yellow)'; };
    dlJpeg.onmouseout = function(){ this.style.background='var(--white)'; };
    var conceptName = card.querySelector('.highlight-line').textContent;
    var conceptLogline = card.querySelector('.concept-logline') ? card.querySelector('.concept-logline').textContent : '';
    var bodyEls = card.querySelectorAll('.concept-body');
    var conceptBody = bodyEls[0] ? bodyEls[0].textContent : '';
    var insight = bodyEls[1] ? bodyEls[1].textContent : '';
    var execution = bodyEls[2] ? bodyEls[2].textContent : '';
    var dlPdf = document.createElement('button');
    dlPdf.innerHTML = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> Download concept (PDF)';
    dlPdf.style.cssText = "display:flex;align-items:center;gap:5px;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink);border:1.5px solid var(--ink);padding:6px 12px;background:var(--white);box-shadow:2px 2px 0 var(--ink);cursor:pointer;";
    dlPdf.onmouseover = function(){ this.style.background='var(--yellow)'; };
    dlPdf.onmouseout = function(){ this.style.background='var(--white)'; };
    dlPdf.onclick = function() { downloadConceptPdf(conceptName, conceptLogline, conceptBody, insight, execution, imgSrc); };
    downloadRow.appendChild(dlJpeg);
    downloadRow.appendChild(dlPdf);
    card.appendChild(downloadRow);
  })
  .catch((err) => {
    console.error('Scamp error:', err);
    btn.classList.remove('loading');
    btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg> Scamp this';
  });
}

function downloadConceptPdf(name, logline, concept, insight, execution, imgSrc) {
  const { jsPDF } = window.jspdf;
  var cards = document.querySelectorAll('.concept-card');
  var targetCard = null;
  for (var i = 0; i < cards.length; i++) {
    var h = cards[i].querySelector('.highlight-line');
    if (h && h.textContent === name) { targetCard = cards[i]; break; }
  }
  if (!targetCard) { alert('Could not find concept card'); return; }
  var hideEls = targetCard.querySelectorAll('a[download], button, .sketch-btn, .concept-image');
  hideEls.forEach(function(el){ el.style.display = 'none'; });
  html2canvas(targetCard, { scale: 2, useCORS: true, backgroundColor: '#ffffff' }).then(function(canvas) {
    hideEls.forEach(function(el){ el.style.display = ''; });
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const pdfWidth = 210;
    const pdfPageHeight = 297;
    const margin = 10;
    // Page 1: concept text only, scaled to fit one page
    const textImgData = canvas.toDataURL('image/png');
    const naturalHeight = (canvas.height * pdfWidth) / canvas.width;
    const maxTextHeight = pdfPageHeight - (margin * 2);
    const textHeight = Math.min(naturalHeight, maxTextHeight);
    const textWidth = naturalHeight > maxTextHeight ? (pdfWidth * maxTextHeight) / naturalHeight : pdfWidth;
    const textX = (pdfWidth - textWidth) / 2;
    pdf.addImage(textImgData, 'PNG', textX, margin, textWidth, textHeight);
    // Page 2: scamp image full bleed (only if scamp exists)
    if (imgSrc) {
      pdf.addPage();
      var scampImg = new Image();
      scampImg.onload = function() {
        var scampW = pdfWidth;
        var scampH = (scampImg.height * pdfWidth) / scampImg.width;
        var topMargin = scampH < 297 ? (297 - scampH) / 2 : 0;
        pdf.addImage(scampImg, 'PNG', 0, topMargin, scampW, Math.min(scampH, 297));
        pdf.save((window._currentBrand || 'cracked').toLowerCase().replace(/\s+/g, '-') + '-' + name.toLowerCase().replace(/\s+/g, '-') + '.pdf');

    const inspHtml = c.inspiredBy && c.inspiredBy.length
      ? `<div class="inspiration-strip"><div class="insp-label">Creative DNA</div><div class="insp-campaigns">${c.inspiredBy.map(ins=>`<div class="insp-campaign"><strong>${ins.campaign}</strong> — ${ins.brand}${ins.year?' ('+ins.year+')':''}<br><span style="font-size:11px;color:#99978F;">${ins.why}</span></div>`).join('')}</div></div>` : '';
    card.innerHTML = `
      <div class="concept-num">Concept ${String(i+1).padStart(2,'0')}</div>
      <div class="concept-name-wrap"><span class="concept-name"><span class="highlight-line">${c.name}</span></span></div>
      <div class="concept-logline">"${c.logline}"</div>
      <div class="concept-body">${c.concept}</div>
      <span class="concept-label">The insight</span>
      <div class="concept-body">${c.keyInsight}</div>
      <span class="concept-label">Bring it to life</span>
      <div class="concept-body">${c.executionIdea}</div>
      <div class="concept-image" style="display:none;"></div>
      <div class="concept-meta">${c.lionsPotential?`<span class="meta-tag highlight">${c.lionsPotential}</span>`:''}</div>
      <div class="concept-actions">
        ${['film','campaign'].includes(_currentFormat) ? `<button class="script-btn" onclick="writeScript(this, ${i})">Write the Full Script →</button>` : ''}
        <button class="sketch-btn" onclick="sketchConcept(this, ${i})">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          Scamp this
        </button>
      </div>`;
    grid.appendChild(card);
    const imgDiv = card.querySelector('.concept-image');

    if (inspHtml) { const d = document.createElement('div'); d.innerHTML = inspHtml; grid.appendChild(d.firstElementChild); }
  });
  document.getElementById('resultsTitle').textContent = `${concepts.length} concepts — ${brand} cracked`;
  window._currentBrand = brand;
  document.getElementById('results').classList.add('active');
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });

  (async () => {
    if (!document.getElementById('generateScamps').checked) return;
    for (const [i, c] of concepts.entries()) {
      const cards = document.querySelectorAll('.concept-card');
      const imgDiv = cards[i] ? cards[i].querySelector('.concept-image') : null;
      if (!imgDiv) continue;
      imgDiv.style.display = 'flex';
      imgDiv.innerHTML = '<span class="img-loading">Sketching concept...</span>';
      try {
        const startR = await fetch('/api/image', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ concept: c.name + ': ' + c.concept, brand: window._currentBrand || '' })
        });
        const startData = await startR.json();
        const jobId = startData.jobId;
        var imgSrc = '';
        // Poll until done
        while (true) {
          await new Promise(r => setTimeout(r, 2000));
          const pollR = await fetch('/api/image-status/' + jobId);
          const pollData = await pollR.json();
          if (pollData.status === 'done') {
            const result = JSON.parse(pollData.result);
            if (result.data && result.data[0] && result.data[0].b64_json) {
              imgSrc = 'data:image/png;base64,' + result.data[0].b64_json;
              imgDiv.innerHTML = '<img src="' + imgSrc + '" alt="Concept visual" />';
            } else if (result.data && result.data[0] && result.data[0].url) {
              imgSrc = result.data[0].url;
              imgDiv.innerHTML = '<img src="' + imgSrc + '" alt="Concept visual" />';
            } else {
              imgDiv.innerHTML = '';
            }
            break;
          } else if (pollData.status === 'error' || pollData.status === 'not_found') {
            imgDiv.innerHTML = '';
            break;
          }
        }
        var btn = cards[i] ? cards[i].querySelector('.sketch-btn') : null;
        if (btn) btn.style.display = 'none';
        if (imgSrc) {
          var conceptName = cards[i].querySelector('.highlight-line').textContent;
          var conceptLogline = cards[i].querySelector('.concept-logline').textContent;
          var conceptBody = cards[i].querySelectorAll('.concept-body')[0].textContent;
          var insight = cards[i].querySelectorAll('.concept-body')[1].textContent;
          var execution = cards[i].querySelectorAll('.concept-body')[2].textContent;
          var downloadRow = document.createElement('div');
          downloadRow.style.cssText = 'display:flex;gap:8px;margin-top:12px;justify-content:flex-end;';
          var dlJpeg = document.createElement('a');
          dlJpeg.href = imgSrc;
          dlJpeg.download = (window._currentBrand || 'cracked').toLowerCase().replace(/\s+/g, '-') + '-' + (conceptName || 'concept').toLowerCase().replace(/\s+/g, '-') + '.jpg';
          dlJpeg.innerHTML = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download scamp (JPEG)';
          dlJpeg.style.cssText = "display:flex;align-items:center;gap:5px;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink);border:1.5px solid var(--ink);padding:6px 12px;background:var(--white);box-shadow:2px 2px 0 var(--ink);text-decoration:none;cursor:pointer;";
          dlJpeg.onmouseover = function(){ this.style.background='var(--yellow)'; };
          dlJpeg.onmouseout = function(){ this.style.background='var(--white)'; };
          var dlPdf = document.createElement('button');
          dlPdf.innerHTML = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> Download concept (PDF)';
          dlPdf.style.cssText = "display:flex;align-items:center;gap:5px;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink);border:1.5px solid var(--ink);padding:6px 12px;background:var(--white);box-shadow:2px 2px 0 var(--ink);cursor:pointer;";
          dlPdf.onmouseover = function(){ this.style.background='var(--yellow)'; };
          dlPdf.onmouseout = function(){ this.style.background='var(--white)'; };
          (function(n,l,b,ins,ex,src){ dlPdf.onclick = function() { downloadConceptPdf(n,l,b,ins,ex,src); }; })(conceptName,conceptLogline,conceptBody,insight,execution,imgSrc);
          downloadRow.appendChild(dlJpeg);
          downloadRow.appendChild(dlPdf);
          cards[i].appendChild(downloadRow);
        }
      } catch {
        imgDiv.innerHTML = '';
      }
    }
  })();
}
function showError(msg) { const el = document.getElementById('errorMsg'); el.textContent = msg; el.classList.add('active'); }
function hideError() { document.getElementById('errorMsg').classList.remove('active'); }
function resetForm() { document.getElementById('results').classList.remove('active'); document.getElementById('briefForm').scrollIntoView({ behavior: 'smooth' }); }
</script>

<script id="archive-data">
const CRACKED_ARCHIVE = [];

function searchArchive(brief, brand, category) {
    const query = (brief + ' ' + brand + ' ' + category).toLowerCase();
    const words = query.split(/\s+/).filter(w => w.length > 3);
    const scored = CRACKED_ARCHIVE.map(entry => {
        const text = ((entry.c||'') + ' ' + (entry.b||'') + ' ' + (entry.cat||'') + ' ' + (entry.desc||'')).toLowerCase();
        let score = 0;
        for (const word of words) {
            if (text.includes(word)) score += 1;
            if ((entry.b||'').toLowerCase().includes(word)) score += 2;
            if ((entry.cat||'').toLowerCase().includes(word)) score += 1;
            if ((entry.desc||'').toLowerCase().includes(word)) score += 1;
        }
        if (entry.award === 'GRAND PRIX') score += 3;
        if (entry.award === 'GOLD') score += 2;
        if (entry.award === 'SILVER') score += 1;
        if (entry.award === 'WEBBY WINNER') score += 1;
        return Object.assign({}, entry, {score: score});
    });
    return scored.filter(e => e.score > 0).sort((a,b) => b.score - a.score).slice(0, 25);
}
</script>

<canvas id="sharpie" style="position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:9999;"></canvas>
<button id="sharpieToggle" title="Toggle sharpie trail" style="position:fixed;bottom:72px;right:20px;z-index:10000;background:none;border:none;cursor:pointer;padding:4px;transition:opacity 0.25s;opacity:0.25;">
  <svg width="32" height="22" viewBox="0 0 32 22" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 13 C4 5, 9 5, 9 11 C9 16, 5 17, 7 12 C9 7, 15 7, 16 12 C17 17, 13 18, 15 13 C17 8, 23 8, 23 13 C23 17, 20 17, 22 13 C24 9, 29 10, 30 11" stroke="#aaa" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </svg>
</button>
<script>
(function() {
  const canvas = document.getElementById('sharpie');
  const ctx = canvas.getContext('2d');
  let W, H;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const FADE = 600;
  const LINE_WIDTH = 4.8;

  let points = [];
  let active = false;
  let enabled = false; // off by default
  let overInteractive = false;

  const toggle = document.getElementById('sharpieToggle');
  toggle.addEventListener('click', () => {
    enabled = !enabled;
    toggle.style.opacity = enabled ? '0.7' : '0.25';
    toggle.querySelector('path').setAttribute('stroke', enabled ? '#1a1008' : '#aaa');
    if (!enabled) { points = []; ctx.clearRect(0, 0, W, H); }
  });

  const interactiveSel = 'input, button, a, select, textarea, .concept-card, .sidebar';
  document.querySelectorAll(interactiveSel).forEach(el => {
    el.addEventListener('mouseenter', () => { overInteractive = true; });
    el.addEventListener('mouseleave', () => { overInteractive = false; });
  });

  window.addEventListener('mousemove', e => {
    if (!enabled || overInteractive) return;
    points.push({ x: e.clientX, y: e.clientY, t: performance.now() });
    if (!active) { active = true; requestAnimationFrame(draw); }
  });

  function draw() {
    const now = performance.now();
    ctx.clearRect(0, 0, W, H);

    while (points.length && now - points[0].t > FADE) points.shift();
    if (points.length < 2) { active = false; return; }

    const segments = [];
    let seg = [points[0]];
    for (let i = 1; i < points.length; i++) {
      if (points[i].t - points[i-1].t > 80) {
        if (seg.length > 1) segments.push(seg);
        seg = [];
      }
      seg.push(points[i]);
    }
    if (seg.length > 1) segments.push(seg);

    for (const seg of segments) {
      if (seg.length < 2) continue;
      const age = now - seg[seg.length - 1].t;
      const alpha = Math.max(0, 1 - age / FADE);
      const a = alpha * alpha;

      const buildPath = () => {
        ctx.beginPath();
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.moveTo(seg[0].x, seg[0].y);
        for (let i = 1; i < seg.length - 1; i++) {
          const mx = (seg[i].x + seg[i+1].x) / 2;
          const my = (seg[i].y + seg[i+1].y) / 2;
          ctx.quadraticCurveTo(seg[i].x, seg[i].y, mx, my);
        }
        ctx.lineTo(seg[seg.length-1].x, seg[seg.length-1].y);
      };

      buildPath();
      ctx.strokeStyle = `rgba(14, 8, 3, ${a * 0.42})`;
      ctx.lineWidth = LINE_WIDTH;
      ctx.stroke();

      buildPath();
      ctx.strokeStyle = `rgba(8, 4, 1, ${a * 0.16})`;
      ctx.lineWidth = LINE_WIDTH * 0.4;
      ctx.stroke();
    }

    if (points.length > 0) requestAnimationFrame(draw);
    else active = false;
  }
})();
</script>
